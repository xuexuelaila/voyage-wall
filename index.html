  .stripe-placeholder {
    background-image: repeating-linear-gradient(135deg, rgba(232,244,250,0.04) 0 2px, transparent 2px 14px);
  }

  .glow-text {
    text-shadow: 0 0 40px rgba(79, 195, 227, 0.25), 0 0 80px rgba(79, 195, 227, 0.15);
  }

  .no-scrollbar::-webkit-scrollbar { display: none; }
  .no-scrollbar { scrollbar-width: none; }

  .feed-fade::after {
    content: ""; position: absolute; inset: auto 0 0 0; height: 48px;
    background: linear-gradient(180deg, transparent, rgba(7,21,39,0.9));
    pointer-events: none;
  }

  @keyframes feedup {
    0% { transform: translateY(0); }
    100% { transform: translateY(-50%); }
  }
  .feedloop { animation: feedup 30s linear infinite; }

  @keyframes bob {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(6px); }
  }
  .bob { animation: bob 2.4s ease-in-out infinite; }

  @keyframes slowdrift {
    0% { transform: translate3d(0,0,0); }

    100% { transform: translate3d(0,0,0); }

    0% { transform: translateY(-4px); opacity: 0.3; }

  }

  <script type="text/babel" data-presets="react">
// ————————————————————————————————————————————————————————————
//  航海作品墙 · Fleet Command Center edition
//  Concept: bridge console + fleet exhibition hall
// ————————————————————————————————————————————————————————————
const { useState, useEffect, useMemo, useRef } = React;
const { AUTHORS, makeWorks, FEED, ROUND_STATS, PROGRESS } = window.__DATA__;

// —— Primitives ——————————————————————————————————————————————
const Icon = ({ name, size = 16, className = "", strokeWidth = 1.75 }) => {
  const ref = useRef(null);
  useEffect(() => {
    if (ref.current && window.lucide) {
      ref.current.innerHTML = "";
      const svg = window.lucide.createElement(window.lucide.icons[name] || window.lucide.icons.Circle);
      svg.setAttribute("width", size);
      svg.setAttribute("height", size);
      svg.setAttribute("stroke-width", strokeWidth);
      ref.current.appendChild(svg);
    }
  }, [name, size, strokeWidth]);
  return <span ref={ref} className={`inline-flex items-center ${className}`} />;
};

const Divider = ({ className = "" }) =>
<div className={`h-px bg-[var(--line)] ${className}`} />;


// —— Cartoon avatar ———————————————————————————————————————————
function CartoonAvatar({ seed = 0, size = 28, ring = false }) {
  const palettes = [
  { bg: "#4FC3E3", skin: "#FFD9B5", hair: "#22324A", acc: "#0C2440" },
  { bg: "#D9B46A", skin: "#FFE3C4", hair: "#2B1B12", acc: "#5B3A18" },
  { bg: "#7FD8F0", skin: "#F6C9A0", hair: "#1A1A2E", acc: "#0E3050" },
  { bg: "#F08A6B", skin: "#FFD2B0", hair: "#3A2418", acc: "#2B1410" },
  { bg: "#8FD8C3", skin: "#FFDAB2", hair: "#1C2330", acc: "#0E3A2B" },
  { bg: "#B4A0E6", skin: "#FFD6B8", hair: "#2A1E3F", acc: "#1A1030" },
  { bg: "#E6B0B0", skin: "#FFDCBA", hair: "#2E1818", acc: "#5B2A2A" },
  { bg: "#9DB8E6", skin: "#FFD3AE", hair: "#1E2A44", acc: "#0A1C3A" }];

  const p = palettes[seed % palettes.length];
  const style = seed % 4;
  const hatOn = seed % 5 === 0;
  const glasses = seed % 6 === 0;
  return (
    <div className="relative rounded-full overflow-hidden shrink-0" style={{ width: size, height: size, background: p.bg, boxShadow: ring ? "0 0 0 2px rgba(79,195,227,0.35)" : undefined }}>
      <svg viewBox="0 0 64 64" width={size} height={size} className="absolute inset-0">
        <rect x="20" y="50" width="24" height="14" rx="4" fill={p.acc} />
        <circle cx="32" cy="30" r="14" fill={p.skin} />
        {style === 0 && <path d="M18 28 C 18 16, 46 16, 46 28 L 46 24 C 44 20, 36 18, 32 18 C 28 18, 22 20, 20 24 Z" fill={p.hair} />}
        {style === 1 && <><path d="M19 30 C 19 18, 45 18, 45 30 L 45 27 C 43 22, 36 20, 32 20 C 28 20, 22 22, 20 27 Z" fill={p.hair} /><circle cx="46" cy="20" r="5" fill={p.hair} /></>}
        {style === 2 && <path d="M18 30 C 18 17, 46 17, 46 30 L 46 25 C 42 20, 38 19, 34 19 L 30 22 C 26 22, 22 24, 20 27 Z" fill={p.hair} />}
        {style === 3 && <path d="M18 28 C 18 18, 46 18, 46 28 C 44 24, 38 22, 32 22 C 26 22, 20 24, 18 28 Z" fill={p.hair} />}
        {hatOn && <><rect x="18" y="20" width="28" height="4" fill={p.acc} /><path d="M20 20 Q 32 10, 44 20 Z" fill="#E8F4FA" /><circle cx="32" cy="16" r="2" fill={p.bg} /></>}
        <circle cx="27" cy="31" r="1.6" fill="#1A1F2B" />
        <circle cx="37" cy="31" r="1.6" fill="#1A1F2B" />
        {glasses && <g fill="none" stroke="#1A1F2B" strokeWidth="1"><circle cx="27" cy="31" r="3.5" /><circle cx="37" cy="31" r="3.5" /><line x1="30.5" y1="31" x2="33.5" y2="31" /></g>}
        <circle cx="24" cy="35" r="1.6" fill={p.bg} opacity="0.5" />
        <circle cx="40" cy="35" r="1.6" fill={p.bg} opacity="0.5" />
        <path d="M29 37 Q 32 40, 35 37" fill="none" stroke="#1A1F2B" strokeWidth="1.2" strokeLinecap="round" />
      </svg>
    </div>);

}
function Avatar({ a, size = 28 }) {return <CartoonAvatar seed={a.id} size={size} />;}

// —— Deep-sea decor ——————————————————————————————————————————
function DeepSeaDecor({ intense = false }) {
  return (
    <div className="dune-overlay" aria-hidden>
      <svg className="absolute inset-0 w-full h-full" preserveAspectRatio="none" viewBox="0 0 1600 900">

          </radialGradient>
          <radialGradient id="dune2" cx="50%" cy="50%" r="50%">

        <ellipse cx="820" cy="260" rx="700" ry="180" fill="url(#dune1)" filter="url(#blur1)" className="drift" />
        <ellipse cx="400" cy="520" rx="500" ry="140" fill="url(#dune2)" filter="url(#blur1)" className="drift-2" />
      </svg>
    </div>);

}

// —— NAVBAR ————————————————————————————————————————————————————
function MyVoyageModal({ open, onClose }) {
  useEffect(() => {
    if (!open) return;
    const onKey = (e) => { if (e.key === "Escape") onClose(); };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [open, onClose]);
  if (!open) return null;

  const voyages = [
    { name: "小红书垂直小店", status: "航行中", icon: "ShoppingBag", color: "#FF6B8A" },
    { name: "视频号带货", status: "航行中", icon: "Video", color: "#D9B46A" },
    { name: "超级AI大航海", status: "航行中", icon: "Anchor", color: "#4FC3E3" },
  ];

  return (
    <div className="fixed inset-0 z-[100] flex items-start justify-end p-0" onClick={onClose}>
      <div onClick={(e) => e.stopPropagation()}
        className="mt-[68px] mr-6 w-[240px] rounded-xl overflow-hidden"
        style={{
          background: "rgba(7, 21, 39, 0.65)",
          backdropFilter: "blur(20px) saturate(1.5)",
          WebkitBackdropFilter: "blur(20px) saturate(1.5)",
          border: "1px solid rgba(79, 195, 227, 0.12)",
          boxShadow: "0 20px 60px -20px rgba(0,0,0,0.6), 0 0 40px -10px rgba(79, 195, 227, 0.1)",
        }}>
        {/* Voyage list */}
        <div className="p-2 space-y-1">
          {voyages.map((v, i) => (
            <div key={i}
              className="group flex items-center gap-2.5 px-3 py-2.5 rounded-lg cursor-pointer transition-all"
              style={{
                background: "transparent",

              onMouseEnter={(e) => {
                e.currentTarget.style.background = "rgba(79, 195, 227, 0.08)";
              }}
              onMouseLeave={(e) => {
                e.currentTarget.style.background = "transparent";
              }}>
              <div className="w-7 h-7 rounded-md flex items-center justify-center shrink-0"
                style={{ background: `${v.color}15` }}>
                <span style={{ color: v.color }}><Icon name={v.icon} size={13} /></span>

              <div className="flex-1 min-w-0">
                <div className="text-[12px] font-medium text-white/85 truncate">{v.name}</div>

              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

      <div className="relative max-w-[1440px] mx-auto px-10 pt-24 pb-6">
        {/* Eyebrow & title */}
        <div className="flex items-end justify-between mb-5">
          <div>
            <h2 className="font-cn-heavy text-[28px] leading-[1.1] text-[#0F1E2E]">从出发到上岸 · 五站航程</h2>
            <p className="mt-1.5 text-[13px] text-[#7A8A9A] leading-relaxed">与其在岸上评头论足，不如上船亲手造一个。</p>
          </div>
        </div>

        {/* Unified task rail — compact inline timeline */}
        <div className="relative rounded-[20px] border border-[#DCE9F2] px-8 py-5"
        style={{ background: "linear-gradient(180deg, #FFFFFF 0%, #F6FBFE 100%)", boxShadow: "0 20px 50px -30px rgba(15,54,89,0.2)" }}>
          {/* Horizontal timeline line */}
          <div className="relative h-[4px] my-6">
            {/* dotted full line */}
            <div className="absolute inset-0 rounded-full"
            style={{ backgroundImage: "repeating-linear-gradient(90deg, #B8C9D9 0 4px, transparent 4px 10px)" }} />
            {/* active progress */}
            <div className="absolute left-0 top-0 h-full rounded-full"
            style={{
              width: `${currentIdx / (TASKS.length - 1) * 100}%`,
              background: "linear-gradient(90deg, #4FA8D8, #7FC9E8)"
            }} />

            {/* Nodes */}
            {TASKS.map((t, i) => {
              const done = t.status === "done";
              const curr = t.status === "current";
              const sel = i === selected;
              const leftPct = i / (TASKS.length - 1) * 100;
              return (
                <div key={t.n}
                className="absolute top-1/2 -translate-x-1/2 -translate-y-1/2"
                style={{ left: `${leftPct}%` }}>
                  {/* Ship marker above current */}
                  {curr &&
                  <svg width="28" height="22" viewBox="-14 -18 28 22"
                  className="absolute left-1/2 -translate-x-1/2 -top-[32px]">
                      <path d="M -10 4 L 10 4 L 7 9 L -7 9 Z" fill="#0A1F3D" />
                      <path d="M -9 4 L 9 4 L 7 7 L -7 7 Z" fill="#C9A349" />
                      <line x1="0" y1="4" x2="0" y2="-14" stroke="#0A1F3D" strokeWidth="1.2" />
                      <path d="M 0 -14 L 0 3 L 9 3 Q 6 -5, 0 -14 Z" fill="#FFFFFF" stroke="#4FA8D8" strokeWidth="1" />
                      <path d="M 0 -14 L 0 3 L -7 3 Q -5 -3, 0 -14 Z" fill="#EAF4FA" stroke="#4FA8D8" strokeWidth="0.8" />
                      <path d="M 0 -14 L 4 -12 L 0 -10 Z" fill="#C9A349" />
                    </svg>
                  }
                  {/* Node dot */}
                  <button onClick={() => setSelected(i)} className="block relative">
                    {curr && <span className="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 w-7 h-7 rounded-full bg-[#4FA8D8]/15 animate-pulse" />}
                    <span className={`relative block rounded-full transition-all ${
                    curr ? "w-4 h-4 bg-[#4FA8D8] ring-4 ring-white shadow-[0_0_0_2px_#4FA8D8]" :
                    done ? "w-3 h-3 bg-[#4FA8D8] ring-2 ring-white" :
                    sel ? "w-3 h-3 bg-white ring-2 ring-[#4FA8D8]" :
                    "w-3 h-3 bg-white ring-2 ring-[#B8C9D9]"}`
                    }>
                      {done &&
                      <svg className="absolute inset-0 m-auto" width="8" height="8" viewBox="-4 -4 8 8">
                          <path d="M -2.5 0 L -0.5 2 L 2.5 -1.5" stroke="#FFFFFF" strokeWidth="1.5" fill="none" strokeLinecap="round" strokeLinejoin="round" />
                        </svg>
                      }
                    </span>
                  </button>
                </div>);

            })}
          </div>

          {/* Labels under each node */}
          <div className="grid grid-cols-5 gap-4 mt-4">
            {TASKS.map((t, i) => {
              const done = t.status === "done";
              const curr = t.status === "current";
              const sel = i === selected;
              return (
                <div key={t.n} className={`text-center transition ${sel ? "" : "opacity-80 hover:opacity-100"}`}>
                  <button onClick={() => setSelected(i)} className="w-full text-center">
                  <div className="flex items-center justify-center gap-2 mb-1.5">
                    <span className={`font-mono text-[10px] tracking-[0.2em] ${
                      done ? "text-[#4FA8D8]" : curr ? "text-[#C9A349]" : "text-[#8FA3B8]"}`
                      }>LEG 0{t.n}</span>
                    <span className={`text-[9px] font-medium px-1.5 py-0.5 rounded-full ${
                      done ? "bg-[#E4F3EA] text-[#2F7A5C]" :
                      curr ? "bg-[#FBF4DF] text-[#8A6B1F]" :
                      "bg-[#F1F5F9] text-[#8FA3B8]"}`
                      }>{done ? "已完成" : curr ? "进行中" : "未开始"}</span>
                  </div>
                  <div className={`font-cn-heavy ${curr ? "text-[18px]" : "text-[15px]"} ${
                    curr || sel ? "text-[#0A1F3D]" : "text-[#3F546B]"} leading-tight`
                    }>
                    {t.title}
                  </div>
                  </button>
                  {curr ?
                  <button onClick={() => setBriefOpen(true)} className="mt-3 h-8 px-4 rounded-full bg-[#4FA8D8] hover:bg-[#3E96C6] text-white text-[12px] font-medium transition">
                      开始作业 →
                    </button> :
                  done ?
                  <div className="mt-2.5 text-[10px] font-mono text-[#8FA3B8]">
                      {t.submits} 件 · 查看 →
                    </div> :

                  <div className="mt-2.5 text-[10px] text-[#B8C9D9]">{t.highlight}</div>
                  }
                </div>);

            })}
          </div>

          {/* legacy block removed */}
        </div>

        {/* —— Works wall: linked to selected task —— */}
        <div className="mt-10">
          <div className="flex items-end justify-between mb-8">
            <div>
              <div className="font-mono text-[11px] tracking-[0.35em] text-[#4FA8D8] mb-3">
                FLEET · LEG 0{selectedTask.n}
              </div>
              <h3 className="font-cn-heavy text-[36px] text-[#0A1F3D] leading-tight">
                这一站 · <span className="text-[#4FA8D8]">{selectedTask.title}</span>
              </h3>
              <p className="mt-2.5 text-[14px] text-[#5A7088]">
                {selectedTask.goal} · 共 <span className="text-[#0A1F3D] font-medium">{selectedTask.submits || "—"}</span> 件提交
              </p>
            </div>
            <div className="flex items-center gap-1 p-1 bg-white rounded-full border border-[#E7EDF3]">
              {TASKS.map((t, i) =>
              <button key={t.n} onClick={() => setSelected(i)}
              className={`px-4 h-9 rounded-full text-[12px] transition ${
              i === selected ? "bg-[#0A1F3D] text-white" : "text-[#5A7088] hover:text-[#0A1F3D]"}`
              }>
                  作业 {t.n}
                </button>
              )}
            </div>
          </div>

          <div className="grid grid-cols-3 gap-6">
            {linkedWorks.map((w, i) => {
              const badge = badgeFor(i, w);
              return (
                <article key={w.id}
                className="group relative rounded-2xl overflow-hidden bg-white border border-[#E7EDF3] hover:border-[#B8D9EC] hover:shadow-[0_24px_50px_-24px_rgba(15,54,89,0.25)] transition-all duration-300 hover:-translate-y-1">
                  {/* Cover */}
                  <div className="relative aspect-[16/10] overflow-hidden"
                  style={{ background: `linear-gradient(135deg, oklch(90% 0.04 ${w.imgHue}), oklch(78% 0.07 ${(w.imgHue + 40) % 360}))` }}>
                    <div className="absolute inset-0 opacity-50" style={{
                      backgroundImage: "radial-gradient(circle at 30% 30%, rgba(255,255,255,0.6), transparent 50%)"
                    }} />
                    <div className="absolute bottom-3 left-3 font-mono text-[10px] tracking-[0.2em] text-white/80 drop-shadow">
                      SHIP · {String(w.id).padStart(3, "0")}
                    </div>
                    {badge &&
                    <div className="absolute top-3 left-3 inline-flex items-center gap-1 px-2.5 py-1 rounded-full text-[11px] font-medium"
                    style={{ background: badge.bg, color: badge.color }}>
                        {badge.label}
                      </div>
                    }
                  </div>
                  {/* Body */}
                  <div className="p-5">
                    <h4 className="font-cn-heavy text-[16px] text-[#0A1F3D] leading-snug truncate">
                      {w.title}
                    </h4>
                    <p className="mt-2 text-[12.5px] text-[#5A7088] leading-relaxed line-clamp-2">
                      {w.excerpt}
                    </p>
                    <div className="mt-4 pt-4 border-t border-[#EEF3F7] flex items-center justify-between">
                      <div className="flex items-center gap-2 cursor-pointer hover:opacity-75 transition" onClick={() => setViewAuthor(w.author)}>
                        <Avatar a={w.author} size={26} />
                        <div className="text-[12px] text-[#0A1F3D]">{w.author.name}</div>
                      </div>
                      <div className="flex items-center gap-3 text-[11.5px] text-[#8FA3B8]">
                        <span className="inline-flex items-center gap-1"><Icon name="Heart" size={12} />{w.likes}</span>
                        <span className="inline-flex items-center gap-1"><Icon name="MessageCircle" size={12} />{w.comments}</span>
                      </div>
                    </div>
                    <button onClick={() => setViewWork(w)}
                      className="mt-3 w-full h-9 rounded-lg bg-white border border-[#E7EDF3] hover:border-[#4FA8D8] text-[12px] text-[#0A1F3D] hover:text-[#4FA8D8] transition inline-flex items-center justify-center gap-1.5">
                      <Icon name="Eye" size={13} /> 查看作品
                    </button>
                  </div>
                </article>);

            })}
          </div>

          {linkedWorks.length === 0 &&
          <div className="rounded-2xl border border-dashed border-[#DCE9F2] py-16 text-center text-[14px] text-[#8FA3B8]">
              这一站还未启航,敬请期待。
            </div>
          }

          {linkedWorks.length > 0 &&
          <div className="mt-10 flex justify-center">
              <button className="px-6 h-11 rounded-full bg-white border border-[#DCE9F2] hover:border-[#4FA8D8] hover:text-[#4FA8D8] text-[13px] text-[#0A1F3D] transition inline-flex items-center gap-2">
                查看这一站全部作品
                <Icon name="ArrowRight" size={14} />
              </button>
            </div>
          }
        </div>
      </div>

      <SubmitWorkModal open={submitOpen} onClose={() => setSubmitOpen(false)} task={selectedTask} />
      <AssignmentModal
        open={briefOpen}
        onClose={() => setBriefOpen(false)}
        task={TASKS[currentIdx]}
        onStart={() => {setBriefOpen(false);setSubmitOpen(true);}} />
      <WorkDetailModal work={viewWork} onClose={() => setViewWork(null)} />
      <UserDrawer author={viewAuthor} allWorks={allWorks} onClose={() => setViewAuthor(null)} onViewWork={(w) => { setViewAuthor(null); setViewWork(w); }} />

    </div>);

}

function SubmitWorkModal({ open, onClose, task }) {
  const [link, setLink] = useState("");
  const [name, setName] = useState("");
  const [intro, setIntro] = useState("");
  const [cover, setCover] = useState(null);
  const [dragOver, setDragOver] = useState(false);
  const fileRef = useRef(null);

  useEffect(() => {
    if (!open) return;
    const onKey = (e) => {if (e.key === "Escape") onClose();};
    window.addEventListener("keydown", onKey);
    const prev = document.body.style.overflow;
    document.body.style.overflow = "hidden";
    return () => {window.removeEventListener("keydown", onKey);document.body.style.overflow = prev;};
  }, [open, onClose]);

  if (!open) return null;

  const onFile = (f) => {
    if (!f) return;
    const url = URL.createObjectURL(f);
    setCover({ url, name: f.name });
  };

  const canSubmit = link && name && intro && cover;

  return (
    <div className="fixed inset-0 z-[100] flex items-center justify-center p-6"
    style={{ background: "rgba(10,31,61,0.45)", backdropFilter: "blur(6px)" }}
    onClick={onClose}>
      <div onClick={(e) => e.stopPropagation()}
      className="relative w-full max-w-[480px] max-h-[90vh] overflow-y-auto bg-white rounded-2xl shadow-[0_40px_80px_-20px_rgba(10,31,61,0.4)] border border-[#E7EDF3]">
        {/* Header */}
        <div className="sticky top-0 z-10 flex items-center justify-between px-6 pt-5 pb-4 bg-white border-b border-[#F1F5F9]">
          <div>
            <h3 className="font-cn-heavy text-[20px] text-[#0F1E2E]">提交作品</h3>
            <div className="mt-0.5 text-[11px] text-[#8FA3B8]">
              当前站点 · <span className="text-[#14B8A6] font-medium">LEG 0{task.n} · {task.title}</span>
            </div>
          </div>
          <button onClick={onClose}
          className="w-8 h-8 rounded-full flex items-center justify-center text-[#8FA3B8] hover:text-[#0F1E2E] hover:bg-[#F4F7FA] transition">
            <Icon name="X" size={18} />
          </button>
        </div>

        {/* Body */}
        <div className="px-6 py-5 space-y-5">
          {/* Link */}
          <Field label="作品链接" required>
            <div className="relative">
              <span className="absolute left-3.5 top-1/2 -translate-y-1/2 text-[#8FA3B8]">
                <Icon name="Link" size={14} />
              </span>
              <input value={link} onChange={(e) => setLink(e.target.value)}
              placeholder="https://scys.com/deepsea"
              className="w-full h-11 pl-10 pr-4 rounded-xl border border-[#E7EDF3] bg-[#FAFCFD] text-[13px] text-[#0F1E2E] placeholder:text-[#B8C9D9] focus:outline-none focus:border-[#14B8A6] focus:bg-white transition" />
            </div>
          </Field>

          {/* Name */}
          <Field label="作品名称" required counter={`${name.length}/20`}>
            <input value={name} maxLength={20} onChange={(e) => setName(e.target.value)}
            placeholder="给你的作品取个名字"
            className="w-full h-11 px-4 rounded-xl border border-[#E7EDF3] bg-[#FAFCFD] text-[13px] text-[#0F1E2E] placeholder:text-[#B8C9D9] focus:outline-none focus:border-[#14B8A6] focus:bg-white transition" />
          </Field>

          {/* Intro */}
          <Field label="一句话介绍" required counter={`${intro.length}/100`}>
            <textarea value={intro} maxLength={100} onChange={(e) => setIntro(e.target.value)}
            rows={3}
            placeholder="这个作品解决了什么问题？"
            className="w-full px-4 py-3 rounded-xl border border-[#E7EDF3] bg-[#FAFCFD] text-[13px] text-[#0F1E2E] placeholder:text-[#B8C9D9] focus:outline-none focus:border-[#14B8A6] focus:bg-white transition resize-none" />
          </Field>

          {/* Cover upload */}
          <Field label="作品截图" required>
            <div
              onClick={() => !cover && fileRef.current?.click()}
              onDragOver={(e) => {e.preventDefault();setDragOver(true);}}
              onDragLeave={() => setDragOver(false)}
              onDrop={(e) => {e.preventDefault();setDragOver(false);onFile(e.dataTransfer.files?.[0]);}}
              className={`relative rounded-xl border border-dashed transition cursor-pointer overflow-hidden
                ${dragOver ? "border-[#14B8A6] bg-[#ECFBF7]" : "border-[#D6E3ED] bg-[#FAFCFD] hover:bg-[#F4F9FC] hover:border-[#B8D9EC]"}
                ${cover ? "p-0" : "px-6 py-12"}
              `}
              style={{ minHeight: 200 }}>

              <input ref={fileRef} type="file" accept="image/png,image/jpeg" hidden
              onChange={(e) => onFile(e.target.files?.[0])} />
              {cover ?
              <div className="relative">
                  <img src={cover.url} alt="" className="w-full h-[200px] object-cover" />
                  <div className="absolute inset-x-0 bottom-0 bg-gradient-to-t from-black/60 to-transparent px-4 py-3 flex items-center justify-between">
                    <span className="text-white text-[12px] truncate max-w-[70%]">{cover.name}</span>
                    <button onClick={(e) => {e.stopPropagation();setCover(null);}}
                  className="text-white/90 hover:text-white text-[12px] underline">重新上传</button>
                  </div>
                </div> :

              <div className="flex flex-col items-center gap-3 text-center">
                  <div className="w-11 h-11 rounded-full bg-white border border-[#E7EDF3] flex items-center justify-center text-[#8FA3B8]">
                    <Icon name="Upload" size={18} />
                  </div>
                  <div>
                    <div className="text-[13px] text-[#0F1E2E]">
                      <span className="font-medium">点击上传</span>
                      <span className="text-[#8FA3B8]">或拖拽图片</span>
                    </div>
                    <div className="mt-1 text-[11px] text-[#B8C9D9] font-mono tracking-wider">JPG · PNG</div>
                  </div>
                </div>
              }
            </div>
          </Field>
        </div>

        {/* Footer */}
        <div className="sticky bottom-0 bg-white border-t border-[#F1F5F9] px-6 py-4 flex items-center justify-between">
          <div className="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-md bg-[#F4F7FA] text-[11px] text-[#5A7088]">
            <span className="text-[#14B8A6]">#</span>作品墙
          </div>
          <div className="flex items-center gap-2">
            <button onClick={onClose}
            className="h-9 px-4 rounded-lg text-[13px] text-[#5A7088] hover:bg-[#F4F7FA] transition">
              取消
            </button>
            <button disabled={!canSubmit}
            className={`h-9 px-5 rounded-lg text-[13px] font-medium transition ${
            canSubmit ? "bg-[#14B8A6] text-white hover:bg-[#0FA090]" : "bg-[#E7EDF3] text-[#B8C9D9] cursor-not-allowed"}`
            }>
              发布作品
            </button>
          </div>
        </div>

        {/* Bottom hint */}
        <div className="px-6 pb-4 text-[11px] text-[#B8C9D9] text-center">
          发布后，作品将同步显示在你的个人主页航记子列表中
        </div>
      </div>
    </div>);

}

function Field({ label, required, counter, children }) {
  return (
    <div>
      <div className="flex items-center justify-between mb-2">
        <label className="text-[13px] font-medium text-[#0F1E2E]">
          {label}{required && <span className="text-[#E15454] ml-1">*</span>}
        </label>
        {counter && <span className="text-[11px] text-[#B8C9D9] font-mono">{counter}</span>}
      </div>
      {children}
    </div>);

}

function AssignmentModal({ open, onClose, task, onStart }) {
  useEffect(() => {
    if (!open) return;
    const onKey = (e) => {if (e.key === "Escape") onClose();};
    window.addEventListener("keydown", onKey);
    const prev = document.body.style.overflow;
    document.body.style.overflow = "hidden";
    return () => {window.removeEventListener("keydown", onKey);document.body.style.overflow = prev;};
  }, [open, onClose]);

  if (!open) return null;

  return (
    <div className="fixed inset-0 z-[100] flex items-center justify-center p-6"
    style={{ background: "rgba(10,31,61,0.45)", backdropFilter: "blur(6px)" }}
    onClick={onClose}>
      <div onClick={(e) => e.stopPropagation()}
      className="relative w-full max-w-[560px] max-h-[90vh] overflow-y-auto bg-white rounded-2xl shadow-[0_40px_80px_-20px_rgba(10,31,61,0.4)] border border-[#E7EDF3]">
        {/* Header banner */}
        <div className="relative px-7 pt-7 pb-6 overflow-hidden"
        style={{ background: "linear-gradient(135deg, #E9F6FF 0%, #F6FBFE 100%)" }}>
          {/* Faint route line decoration */}
          <svg className="absolute right-0 top-0 opacity-40" width="240" height="120" viewBox="0 0 240 120" fill="none">
            <path d="M0 90 Q 60 70 120 80 T 240 60" stroke="#4FA8D8" strokeWidth="1.5" strokeDasharray="3 6" fill="none" />
            <circle cx="120" cy="80" r="5" fill="#FFFFFF" stroke="#4FA8D8" strokeWidth="2" />
            <circle cx="240" cy="60" r="4" fill="#FFFFFF" stroke="#B8C9D9" strokeWidth="1.5" />
          </svg>

          <button onClick={onClose}
          className="absolute top-5 right-5 w-8 h-8 rounded-full flex items-center justify-center text-[#5A7088] hover:text-[#0F1E2E] hover:bg-white/70 transition">
            <Icon name="X" size={18} />
          </button>

          <div className="relative">
            <div className="inline-flex items-center gap-2 font-mono text-[10px] tracking-[0.25em] text-[#C9A349] mb-3">
              <span className="w-5 h-5 rounded-full bg-[#C9A349] text-white flex items-center justify-center text-[10px] font-bold">!</span>
              LEG 0{task.n} · 进行中
            </div>
            <h3 className="font-cn-heavy text-[28px] leading-tight text-[#0F1E2E]">{task.title}</h3>
            <p className="mt-1.5 text-[13px] text-[#5A7088]">{task.subtitle}</p>

            <div className="mt-5 flex items-center gap-5 text-[12px] text-[#5A7088]">
              <div className="inline-flex items-center gap-1.5">

              </div>
              <div className="inline-flex items-center gap-1.5">
                <Icon name="Users" size={13} className="text-[#8FA3B8]" />
                已提交 <span className="font-mono text-[#0F1E2E]">{task.submits}</span> 件
              </div>
            </div>
          </div>
        </div>

        {/* Body */}
        <div className="px-7 py-6 space-y-6">
          {/* Overview */}
          <section>
            <SectionLabel>任务简介</SectionLabel>
            <p className="mt-3 text-[13px] leading-[1.7] text-[#3F546B]">{task.overview}</p>
          </section>

          {/* Deliverables */}
          <section>
            <SectionLabel>需要提交</SectionLabel>
            <ul className="mt-3 space-y-2">
              {task.deliverables?.map((d, i) =>
              <li key={i} className="flex gap-3 text-[13px] text-[#3F546B] leading-relaxed">
                  <span className="mt-[5px] font-mono text-[10px] text-[#4FA8D8] shrink-0 w-5">0{i + 1}</span>
                  <span>{d}</span>
                </li>
              )}

          </section>

              <div className="flex items-center gap-2 mb-2">
                <span className="text-[14px]">💡</span>
                <span className="text-[12px] font-medium text-[#8A6B1F]">船长贴士</span>
              </div>
              <ul className="space-y-1.5">
                {task.tips.map((t, i) =>
              <li key={i} className="text-[12px] text-[#8A6B1F]/90 leading-relaxed pl-6 -indent-6 before:content-['·'] before:mr-2.5 before:text-[#C9A349]">
                    {t}
                  </li>
              )}
              </ul>
            </section>
          }
        </div>

        {/* Footer */}

function CourseDetailView({ course, onBack }) {
  const data = COURSE_CHAPTERS[course.id] || DEFAULT_COURSE_CONTENT;
  const [activeChapter, setActiveChapter] = useState(data.sections[0].chapters[0].id);
  const [expandedSections, setExpandedSections] = useState({ 0: true });

  const toggleSection = (i) => setExpandedSections((prev) => ({ ...prev, [i]: !prev[i] }));

  // Render markdown-like content
  const renderContent = (text) => {
    return text.split('\n').map((line, i) => {
      if (line.startsWith('## ')) return <h2 key={i} className="font-cn-heavy text-[22px] text-[#0A1F3D] mt-8 mb-4">{line.slice(3)}</h2>;
      if (line.startsWith('### ')) return <h3 key={i} className="font-cn-heavy text-[17px] text-[#0A1F3D] mt-6 mb-3">{line.slice(4)}</h3>;
      if (line.startsWith('> ')) return <blockquote key={i} className="my-4 pl-4 border-l-3 border-[#4FA8D8] bg-[#F6FBFE] rounded-r-lg px-4 py-3 text-[13px] text-[#3F546B] leading-[1.8]" style={{ borderLeftWidth: 3 }}>{line.slice(2).replace(/\*\*(.*?)\*\*/g, '$1')}</blockquote>;
      if (line.startsWith('- ')) return <li key={i} className="ml-5 text-[14px] text-[#3F546B] leading-[2] list-disc">{line.slice(2)}</li>;
      if (line.startsWith('**') && line.endsWith('**')) return <p key={i} className="text-[14px] text-[#0A1F3D] font-medium leading-[2] my-2">{line.slice(2, -2)}</p>;
      if (line.trim() === '') return <div key={i} className="h-3" />;
      // Handle inline bold
      const parts = line.split(/\*\*(.*?)\*\*/g);
      return <p key={i} className="text-[14px] text-[#3F546B] leading-[2]">{parts.map((p, j) => j % 2 === 1 ? <strong key={j} className="text-[#0A1F3D]">{p}</strong> : p)}</p>;
    });
  };

  return (
    <div className="relative bg-white min-h-screen flex">
      {/* Left sidebar */}
      <div className="w-[280px] shrink-0 border-r border-[#EEF3F7] bg-[#FAFCFD] pt-20 overflow-y-auto h-screen sticky top-0">
        <div className="px-5 pb-4 border-b border-[#EEF3F7]">
          <button onClick={onBack} className="flex items-center gap-1.5 text-[12px] text-[#4FA8D8] hover:text-[#3E96C6] transition mb-3">
            <Icon name="ArrowLeft" size={13} /> 返回手册
          </button>
          <div className="flex items-center gap-3">
            <CartoonAvatar seed={3} size={36} />
            <div className="flex-1 min-w-0">
              <div className="font-cn-heavy text-[14px] text-[#0A1F3D] truncate">{course.title}</div>
              <div className="text-[11px] text-[#8FA3B8] mt-0.5 truncate">{course.desc}</div>
            </div>
          </div>
          <div className="mt-3 flex items-center justify-between text-[11px] text-[#8FA3B8]">
            <span>已学：</span>
            <span className="font-mono">{course.progress}%</span>
          </div>
          <div className="mt-1.5 h-1 rounded-full bg-[#E7EDF3] overflow-hidden">
            <div className="h-full rounded-full bg-[#4FA8D8]" style={{ width: `${course.progress}%` }} />
          </div>
        </div>

        {/* Chapter list */}
        <div className="py-3">
          {data.sections.map((sec, si) => (
            <div key={si}>
              <button onClick={() => toggleSection(si)}
                className="w-full flex items-center justify-between px-5 py-2.5 text-[13px] font-medium text-[#0A1F3D] hover:bg-[#F0F5FA] transition">
                <span>{sec.title}</span>
                <span className={`transition-transform ${expandedSections[si] ? "" : "-rotate-90"}`}>
                  <Icon name="ChevronDown" size={14} className="text-[#8FA3B8]" />
                </span>
              </button>
              {expandedSections[si] && (
                <div className="pb-1">
                  {sec.chapters.map((ch) => (
                    <button key={ch.id} onClick={() => setActiveChapter(ch.id)}
                      className={`w-full text-left px-5 py-2.5 text-[12.5px] leading-[1.5] transition border-l-2 ${
                        activeChapter === ch.id
                          ? "bg-[#E9F6FF] border-[#4FA8D8] text-[#4FA8D8] font-medium"
                          : "border-transparent text-[#3F546B] hover:bg-[#F4F7FA]"
                      }`}>
                      <div className="truncate">{ch.title}</div>
                      {ch.students > 0 && <div className="text-[10px] text-[#B8C9D9] mt-0.5 font-mono">{ch.students}人学过</div>}
                    </button>
                  ))}
                </div>
              )}
            </div>
          ))}
        </div>
      </div>

      {/* Right content */}
      <div className="flex-1 pt-20 min-w-0">
        {/* Breadcrumb */}

          </div>
        </div>

        {/* Article content */}
        <div className="px-10 py-8 max-w-[800px]">
          <h1 className="font-cn-heavy text-[28px] text-[#0A1F3D] leading-tight mb-6">{data.content.title}</h1>
          <div>{renderContent(data.content.body)}</div>
        </div>
      </div>
    </div>
  );
}

// —— FLOATING FEED BUBBLE ————————————————————————————————————
function FeedBubble() {
  const [expanded, setExpanded] = useState(false);
  const [pos, setPos] = useState({ x: window.innerWidth - 160, y: window.innerHeight - 80 });
  const dragging = useRef(false);
  const offset = useRef({ x: 0, y: 0 });
  const moved = useRef(false);
  const bubbleRef = useRef(null);

  // Current feed item for ticker
  const [tickIdx, setTickIdx] = useState(0);
  useEffect(() => {
    const t = setInterval(() => setTickIdx((i) => (i + 1) % FEED.length), 3000);
    return () => clearInterval(t);
  }, []);

  const onDown = (e) => {
    dragging.current = true;
    moved.current = false;
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    offset.current = { x: clientX - pos.x, y: clientY - pos.y };
    e.preventDefault();
  };

  useEffect(() => {
    const onMove = (e) => {
      if (!dragging.current) return;
      moved.current = true;
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;
      setPos({
        x: Math.max(0, Math.min(window.innerWidth - 160, clientX - offset.current.x)),
        y: Math.max(60, Math.min(window.innerHeight - 60, clientY - offset.current.y)),
      });
    };
    const onUp = () => { dragging.current = false; };
    window.addEventListener("mousemove", onMove);
    window.addEventListener("mouseup", onUp);
    window.addEventListener("touchmove", onMove, { passive: false });
    window.addEventListener("touchend", onUp);
    return () => {
      window.removeEventListener("mousemove", onMove);
      window.removeEventListener("mouseup", onUp);
      window.removeEventListener("touchmove", onMove);
      window.removeEventListener("touchend", onUp);
    };
  }, []);

  const handleClick = () => {
    if (!moved.current) setExpanded((v) => !v);
  };

  const currentFeed = FEED[tickIdx];

  return (
    <div ref={bubbleRef} className="fixed z-[90] select-none" style={{ left: pos.x, top: pos.y }}>
      {/* Expanded panel */}
      {expanded && (
        <div className="absolute bottom-[52px] right-0 w-[300px] rounded-2xl overflow-hidden"
          style={{
            background: "rgba(7, 21, 39, 0.92)",
            backdropFilter: "blur(20px)",
            border: "1px solid rgba(79, 195, 227, 0.12)",
            boxShadow: "0 20px 60px -15px rgba(0,0,0,0.6)",
            animation: "bubbleUp 0.25s ease-out",
          }}>
          <div className="px-4 py-3 flex items-center justify-between border-b border-white/8">
            <div className="flex items-center gap-2">
              <span className="relative flex w-1.5 h-1.5">
                <span className="absolute inset-0 rounded-full bg-[#4FC3E3] animate-ping opacity-60" />
                <span className="relative w-1.5 h-1.5 rounded-full bg-[#4FC3E3]" />
              </span>
              <span className="font-mono text-[9px] tracking-[0.3em] text-[#4FC3E3]">CREW</span>
              <span className="text-white/15 text-[10px]">│</span>
              <span className="font-mono text-[9px] tracking-[0.2em] text-white/50">作 业 动 态</span>
            </div>
          </div>
          <div className="p-3 space-y-2 max-h-[280px] overflow-y-auto no-scrollbar">
            {FEED.map((f, i) => (
              <div key={i} className="flex items-start gap-2.5 text-[11.5px] leading-[1.4] px-1 py-1 rounded-lg hover:bg-white/5 transition">
                <span className="relative mt-[6px] shrink-0">
                  <span className="absolute inset-0 rounded-full bg-[#4FC3E3] blur-[3px] opacity-70" />
                  <span className="relative block w-1 h-1 rounded-full bg-[#4FC3E3]" />
                </span>
                <div className="min-w-0 flex-1">
                  <span className="text-white/75">
                    <span className="text-white font-medium">{f.who}</span> {f.what}
                  </span>
                  <span className="ml-1.5 font-mono text-[9px] text-white/30">{f.when}</span>
                </div>
              </div>
            ))}
          </div>
          <div className="px-4 py-2 border-t border-white/8 font-mono text-[9px] tracking-[0.2em] text-white/25 text-center">
            ● STREAMING · 实 时 同 步
          </div>
        </div>
      )}

      {/* Bubble */}
      <div
        onMouseDown={onDown}
        onTouchStart={onDown}
        onClick={handleClick}
        className="flex items-center gap-2 h-[42px] pl-3 pr-4 rounded-full cursor-grab active:cursor-grabbing transition-shadow"
        style={{
          background: "linear-gradient(135deg, rgba(10, 31, 61, 0.9), rgba(20, 50, 86, 0.9))",
          backdropFilter: "blur(12px)",
          border: "1px solid rgba(79, 195, 227, 0.2)",
          boxShadow: expanded
            ? "0 8px 30px -8px rgba(79, 195, 227, 0.4), 0 0 0 1px rgba(79, 195, 227, 0.15)"
            : "0 8px 24px -8px rgba(0,0,0,0.4)",
        }}>
        <span className="relative flex w-2 h-2 shrink-0">
          <span className="absolute inset-0 rounded-full bg-[#4FC3E3] animate-ping opacity-50" />
          <span className="relative w-2 h-2 rounded-full bg-[#4FC3E3]" />
        </span>
        <span className="text-[11px] text-white/80 whitespace-nowrap overflow-hidden max-w-[120px]" style={{
          animation: "tickFade 3s ease-in-out infinite",
        }}>
          <span className="text-white font-medium">{currentFeed.who}</span> {currentFeed.what}
        </span>
      </div>

      <style>{`
        @keyframes bubbleUp {
          from { opacity: 0; transform: translateY(8px) scale(0.95); }
          to { opacity: 1; transform: translateY(0) scale(1); }
        }
        @keyframes tickFade {
          0%, 100% { opacity: 0.6; }
          15%, 85% { opacity: 1; }
        }
      `}</style>
    </div>
  );
}

  const [page, setPage] = useState(1);

  const allWorks = useMemo(() => {
    const base = makeWorks(72);
    return base.map((w, i) => {
      let shipState;
      if (i % 11 === 0) shipState = "pending";else
      if (w.round <= 3) shipState = "landed";else
      shipState = "sailing";
      return { ...w, shipState };
    });
  }, []);

  const counts = useMemo(() => ({
    all: allWorks.length,
    sailing: allWorks.filter((w) => w.shipState === "sailing").length,
    landed: allWorks.filter((w) => w.shipState === "landed").length,
    pending: allWorks.filter((w) => w.shipState === "pending").length
  }), [allWorks]);

  const filtered = useMemo(() => {
    let r = allWorks;
    if (status !== "all") r = r.filter((w) => w.shipState === status);
    if (round !== "all") r = r.filter((w) => w.round === round);
    if (q.trim()) {
      const qq = q.trim().toLowerCase();
      r = r.filter((w) => w.title.toLowerCase().includes(qq) || w.author.name.includes(qq));
    }
    r = [...r].sort((a, b) => sort === "hot" ? b.likes - a.likes : b.id - a.id);
    return r;
  }, [allWorks, status, round, sort, q]);

  const PER = 12;
  const totalPages = Math.max(1, Math.ceil(filtered.length / PER));
  const paged = filtered.slice((page - 1) * PER, page * PER);

  useEffect(() => {setPage(1);}, [status, round, sort, q]);

  const handleEnter = () => {
    setEntered(true);

      if (el) el.scrollIntoView({ behavior: "smooth", block: "start" });
    }, 100);

      <Navbar entered={entered} setEntered={setEntered} navTab={navTab} setNavTab={setNavTab} />

            </div>

}
