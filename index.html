<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>5月超级AI大航海 · 作业墙</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  html, body { background: #FAFCFD; }
  body { font-family: 'Inter', 'Noto Sans SC', system-ui, sans-serif; color: #0A1F3D; -webkit-font-smoothing: antialiased; }
  .font-cn-heavy { font-family: 'Noto Sans SC', sans-serif; font-weight: 900; }
  .font-cn { font-family: 'Noto Sans SC', sans-serif; }
  .num { font-feature-settings: "tnum" 1; }
  ::selection { background: #4FC3E3; color: white; }
  @keyframes likePopAnim { 0% { transform: scale(1); } 50% { transform: scale(1.4); } 100% { transform: scale(1); } }
  .like-pop { animation: likePopAnim 0.3s ease-out; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo, useRef } = React;

// ── Icon ──
const Icon = ({ name, size = 16, className = "", strokeWidth = 1.75 }) => {
  const ref = useRef(null);
  useEffect(() => {
    if (ref.current && window.lucide) {
      ref.current.innerHTML = "";
      const svg = window.lucide.createElement(window.lucide.icons[name] || window.lucide.icons.Circle);
      svg.setAttribute("width", size);
      svg.setAttribute("height", size);
      svg.setAttribute("stroke-width", strokeWidth);
      ref.current.appendChild(svg);
    }
  }, [name, size, strokeWidth]);
  return <span ref={ref} className={`inline-flex items-center ${className}`} />;
};

// ── Avatar ──
function Avatar({ url, name, size = 28 }) {
  const [err, setErr] = useState(false);
  if (url && !err) {
    return <img src={url} alt={name} className="rounded-full overflow-hidden shrink-0 object-cover" style={{ width: size, height: size }} onError={() => setErr(true)} />;
  }
  // Fallback: letter avatar
  const colors = ["#4FC3E3","#D9B46A","#7FD8F0","#F08A6B","#8FD8C3","#B4A0E6","#E6B0B0","#9DB8E6"];
  const c = colors[(name || "").charCodeAt(0) % colors.length];
  return (
    <div className="rounded-full overflow-hidden shrink-0 flex items-center justify-center font-cn-heavy text-white" style={{ width: size, height: size, background: c, fontSize: size * 0.4 }}>
      {(name || "?").slice(0, 1)}
    </div>
  );
}

// ── Data Loading ──
function useWorks() {
  const [works, setWorks] = useState([]);
  const [loading, setLoading] = useState(true);
  useEffect(() => {
    fetch("data.json").then(r => r.json()).then(data => {
      const parsed = data.map((d, i) => ({
        id: d.id || i + 1,
        title: d.formName || "作业提交",
        excerpt: d.description || "",
        author: { name: d.name, avatar: d.avatar },
        round: d.round || 3,
        featured: i % 13 === 0,
        likes: Math.floor(Math.random() * 200) + 5,
        images: d.images || [],
        imgHue: (i * 47) % 360,
        createdAt: new Date(d.createdAt).getTime() || Date.now() - i * 3600000,
      }));
      setWorks(parsed);
      setLoading(false);
    }).catch(() => setLoading(false));
  }, []);
  return { works, loading };
}

// ── Work Detail Modal ──
function WorkDetailModal({ work, onClose, onLike, liked }) {
  const [showShare, setShowShare] = useState(false);
  const [imgZoom, setImgZoom] = useState(false);

  useEffect(() => {
    if (!work) return;
    const onKey = (e) => { if (e.key === "Escape") { if (imgZoom) setImgZoom(false); else if (showShare) setShowShare(false); else onClose(); }};
    window.addEventListener("keydown", onKey);
    document.body.style.overflow = "hidden";
    return () => { window.removeEventListener("keydown", onKey); document.body.style.overflow = ""; };
  }, [work, imgZoom, showShare]);

  if (!work) return null;

  return (
    <div className="fixed inset-0 z-[100] flex items-center justify-center p-6" style={{ background: "rgba(10,31,61,0.5)", backdropFilter: "blur(8px)" }} onClick={onClose}>
      <div onClick={(e) => e.stopPropagation()} className="relative w-full max-w-[600px] max-h-[85vh] overflow-y-auto bg-white rounded-2xl shadow-[0_40px_80px_-20px_rgba(10,31,61,0.4)] border border-[#E7EDF3]">
        {/* Cover */}
        <div className="relative h-[180px] overflow-hidden rounded-t-2xl" style={{ background: `linear-gradient(135deg, oklch(85% 0.05 ${work.imgHue}), oklch(72% 0.08 ${(work.imgHue + 40) % 360}))` }}>
          <div className="absolute inset-0 opacity-40" style={{ backgroundImage: "radial-gradient(circle at 30% 30%, rgba(255,255,255,0.5), transparent 50%)" }} />
          {work.featured && <div className="absolute top-4 left-4 inline-flex items-center gap-1 px-2.5 py-1 rounded-full bg-[#FBF4DF] text-[#C9A349] text-[11px] font-medium"><Icon name="Star" size={11} strokeWidth={2.5} /> 精选</div>}
          <button onClick={onClose} className="absolute top-4 right-4 w-8 h-8 rounded-full bg-black/20 hover:bg-black/40 text-white flex items-center justify-center transition"><Icon name="X" size={16} /></button>
        </div>

        <div className="px-6 py-5">
          <h3 className="font-cn-heavy text-[22px] text-[#0A1F3D] leading-snug">{work.title}</h3>
          <div className="mt-3 flex items-center gap-3">
            <Avatar url={work.author.avatar} name={work.author.name} size={32} />
            <div>
              <div className="text-[13px] font-medium text-[#0A1F3D]">{work.author.name}</div>
              <div className="text-[10px] text-[#8FA3B8]">作业 {work.round} · {new Date(work.createdAt).toLocaleDateString("zh-CN")}</div>
            </div>
          </div>
          <div className="mt-4 h-px bg-[#EEF3F7]" />
          <p className="mt-4 text-[13px] text-[#3F546B] leading-[1.8]">{work.excerpt}</p>

          {/* Link */}
          <a href={work.link} target="_blank" rel="noopener noreferrer" className="mt-4 flex items-center gap-2 px-4 py-2.5 rounded-xl bg-[#F6FBFE] border border-[#E7EDF3] hover:border-[#4FA8D8] transition group">
            <Icon name="ExternalLink" size={14} className="text-[#4FA8D8]" />
            <span className="text-[12px] text-[#4FA8D8] group-hover:underline truncate">{work.link}</span>
          </a>

          {/* Screenshots */}
          {work.images && work.images.length > 0 && (
            <div className="mt-4 grid grid-cols-3 gap-2">
              {work.images.slice(0, 6).map((img, i) => (
                <div key={i} onClick={() => setImgZoom(img)} className="aspect-[4/3] rounded-lg overflow-hidden cursor-pointer hover:opacity-80 transition relative group bg-[#F4F7FA]">
                  <img src={img} alt="" className="w-full h-full object-cover" />
                  <div className="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition bg-black/20">
                    <div className="w-7 h-7 rounded-full bg-white/90 flex items-center justify-center"><Icon name="ZoomIn" size={12} /></div>
                  </div>
                </div>
              ))}
            </div>
          )}

          {/* Actions */}
          <div className="mt-5 flex items-center justify-between">
            <button onClick={() => onLike(work.id)}
              className={`h-9 px-4 rounded-full text-[12px] font-medium transition inline-flex items-center gap-1.5 ${
                liked ? "bg-[#FEE2E2] text-[#E15454] border border-[#FECACA]" : "bg-[#F4F7FA] text-[#5A7088] border border-[#E7EDF3] hover:border-[#E15454] hover:text-[#E15454]"
              }`}>
              <span className={liked ? "like-pop" : ""}><Icon name="Heart" size={14} /></span>
              {(liked ? work.likes + 1 : work.likes)}
            </button>
            <button onClick={() => setShowShare(true)}
              className="h-9 px-4 rounded-full bg-[#4FA8D8] hover:bg-[#3E96C6] text-white text-[12px] font-medium transition inline-flex items-center gap-1.5">
              <Icon name="Share2" size={13} /> 生成分享卡片
            </button>
          </div>
        </div>
      </div>

      {/* Share overlay */}
      {showShare && (
        <div className="fixed inset-0 z-[110] flex items-center justify-center bg-black/70" onClick={() => setShowShare(false)}>
          <div onClick={(e) => e.stopPropagation()}>
            <div className="w-[340px] rounded-3xl overflow-hidden shadow-[0_30px_80px_-20px_rgba(0,0,0,0.6)]" style={{ background: "linear-gradient(180deg, #E9F6FF 0%, #D4EDFC 30%, #EEF6FB 100%)" }}>
              <div className="px-5 pt-5 pb-3 flex items-center gap-3">
                <Avatar url={work.author.avatar} name={work.author.name} size={36} />
                <div>
                  <div className="text-[14px] font-medium text-[#0A1F3D]">{work.author.name}@超级AI大航海</div>
                  <div className="text-[11px] text-[#5A7088]">邀请你来查看这个作品</div>
                </div>
              </div>
              <div className="mx-4 rounded-2xl bg-white p-5 shadow-[0_4px_20px_-8px_rgba(0,0,0,0.08)]">
                <h3 className="font-cn-heavy text-[18px] text-[#0A1F3D] leading-snug">{work.title}</h3>
                <p className="mt-2 text-[12px] text-[#3F546B] leading-[1.6] line-clamp-3">{work.excerpt}</p>
                <div className="mt-3 flex items-center gap-2">
                  <Avatar url={work.author.avatar} name={work.author.name} size={24} />
                  <span className="text-[11px] text-[#0A1F3D]">{work.author.name}</span>
                  <span className="text-[10px] text-[#B8C9D9] ml-auto">{new Date(work.createdAt).toLocaleDateString("zh-CN")}</span>
                </div>
              </div>
              <div className="px-4 pt-3 pb-4 flex items-center justify-between">
                <div className="flex items-center gap-2">
                  <div className="w-6 h-6 rounded flex items-center justify-center" style={{ background: "rgba(79,168,216,0.15)", color: "#4FA8D8" }}><Icon name="Anchor" size={12} /></div>
                  <span className="text-[11px] text-[#0A1F3D] font-medium">生财有术 · 航海实战</span>
                </div>
                <div className="w-[48px] h-[48px] rounded-lg bg-white border border-[#E7EDF3] flex items-center justify-center">
                  <svg viewBox="0 0 48 48" width="48" height="48"><rect width="48" height="48" fill="white"/><rect x="4" y="4" width="14" height="14" rx="2" fill="#0A1F3D"/><rect x="7" y="7" width="8" height="8" rx="1" fill="white"/><rect x="9" y="9" width="4" height="4" fill="#0A1F3D"/><rect x="30" y="4" width="14" height="14" rx="2" fill="#0A1F3D"/><rect x="33" y="7" width="8" height="8" rx="1" fill="white"/><rect x="35" y="9" width="4" height="4" fill="#0A1F3D"/><rect x="4" y="30" width="14" height="14" rx="2" fill="#0A1F3D"/><rect x="7" y="33" width="8" height="8" rx="1" fill="white"/><rect x="9" y="35" width="4" height="4" fill="#0A1F3D"/><rect x="22" y="22" width="4" height="4" fill="#4FA8D8"/><rect x="30" y="30" width="4" height="4" fill="#0A1F3D"/><rect x="38" y="38" width="4" height="4" fill="#0A1F3D"/></svg>
                </div>
              </div>
            </div>
            <div className="mt-3 flex justify-center gap-3">
              <button onClick={() => setShowShare(false)} className="h-8 px-4 rounded-full bg-white/20 text-white text-[11px]">关闭</button>
              <button className="h-8 px-4 rounded-full bg-white text-[#0A1F3D] text-[11px] font-medium inline-flex items-center gap-1"><Icon name="Download" size={12} /> 保存图片</button>
            </div>
          </div>
        </div>
      )}

      {/* Image zoom */}
      {imgZoom && (
        <div className="fixed inset-0 z-[110] flex items-center justify-center bg-black/80 p-8" onClick={() => setImgZoom(false)}>
          <div className="relative max-w-[90vw] max-h-[90vh]">
            <img src={imgZoom} alt="" className="max-w-full max-h-[85vh] rounded-xl object-contain" />
            <button onClick={() => setImgZoom(false)} className="absolute top-3 right-3 w-9 h-9 rounded-full bg-black/40 text-white flex items-center justify-center"><Icon name="X" size={18} /></button>
          </div>
        </div>
      )}
    </div>
  );
}

// ── Work Card ──
function WorkCard({ work, onClick, onLike, liked }) {
  return (
    <article className="group rounded-2xl overflow-hidden bg-white border border-[#E7EDF3] hover:border-[#B8D9EC] hover:shadow-[0_20px_40px_-20px_rgba(15,54,89,0.18)] transition-all duration-300 hover:-translate-y-1">
      <div className="p-4 pb-3">
        {/* Tags */}
        <div className="flex items-center gap-2 mb-2.5">
          {work.featured && <span className="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-[10px] font-medium bg-[#FBF4DF] text-[#C9A349]"><Icon name="Star" size={10} /> 精选</span>}
          <span className="text-[10px] text-[#B8C9D9] font-cn ml-auto">作业 {work.round}</span>
        </div>

        {/* Title */}
        <h4 className="font-cn-heavy text-[15px] text-[#0A1F3D] leading-snug truncate cursor-pointer hover:text-[#4FA8D8] transition" onClick={onClick}>{work.title}</h4>

        {/* Excerpt */}
        <p className="mt-2 text-[12px] text-[#5A7088] leading-relaxed line-clamp-2">{work.excerpt}</p>

        {/* Thumbnails */}
        {work.images && work.images.length > 0 && (
          <div className="mt-3 flex gap-1">
            {work.images.slice(0, 6).map((img, i) => (
              <img key={i} src={img} alt="" onClick={onClick}
                className="w-10 h-10 rounded-md overflow-hidden cursor-pointer hover:opacity-75 transition shrink-0 object-cover bg-[#F4F7FA]" />
            ))}
          </div>
        )}
      </div>

      {/* Footer */}
      <div className="px-4 pb-4 pt-2 flex items-center justify-between">
        <div className="flex items-center gap-2">
          <CartoonAvatar seed={work.author.id} size={22} />
          <span className="text-[11px] text-[#0A1F3D]">{work.author.name}</span>
        </div>
        <div className="flex items-center gap-2">
          <button onClick={(e) => { e.stopPropagation(); onLike(work.id); }}
            className={`inline-flex items-center gap-1 text-[11px] transition px-2 py-1 rounded-full ${
              liked ? "text-[#E15454] bg-[#FEF2F2]" : "text-[#8FA3B8] hover:text-[#E15454] hover:bg-[#FEF2F2]"
            }`}>
            <span className={liked ? "like-pop" : ""}><Icon name="Heart" size={12} /></span>
            <span className="num">{liked ? work.likes + 1 : work.likes}</span>
          </button>
          <button onClick={onClick}
            className="h-7 px-3 rounded-full bg-[#F6FBFE] border border-[#E7EDF3] hover:border-[#4FA8D8] hover:text-[#4FA8D8] text-[#5A7088] text-[10px] font-medium transition inline-flex items-center gap-1">
            <Icon name="Eye" size={11} /> 查看作品
          </button>
        </div>
      </div>
    </article>
  );
}

// ── App ──
// ── Navbar ──
function Navbar() {
  return (
    <nav className="fixed top-0 left-0 right-0 z-50" style={{
      background: "rgba(255,255,255,0.88)",
      backdropFilter: "blur(16px) saturate(1.3)",
      borderBottom: "1px solid rgba(0,0,0,0.06)",
      boxShadow: "0 1px 8px -2px rgba(0,0,0,0.06)",
    }}>
      <div className="max-w-[1280px] mx-auto px-8 h-14 flex items-center">
        <div className="flex items-center gap-2.5">
          <div className="w-7 h-7 rounded-md flex items-center justify-center" style={{
            background: "rgba(79,168,216,0.1)", border: "1px solid rgba(79,168,216,0.25)", color: "#4FA8D8",
          }}>
            <Icon name="Anchor" size={14} strokeWidth={2} />
          </div>
          <span className="font-cn-heavy text-[16px] text-[#0A1F3D]">5月超级AI大航海</span>
          <span className="text-[#DCE9F2] mx-1">│</span>
          <span className="font-cn text-[14px] text-[#5A7088]">作业墙</span>
        </div>
      </div>
    </nav>
  );
}

// ── App ──
function App() {
  const [round, setRound] = useState("all");
  const [sort, setSort] = useState("new");
  const [viewWork, setViewWork] = useState(null);
  const [likedIds, setLikedIds] = useState(() => {
    try { return JSON.parse(localStorage.getItem("voyage_likes") || "{}"); } catch { return {}; }
  });

  const { works: allWorks, loading } = useWorks();

  const toggleLike = (id) => {
    setLikedIds((prev) => {
      const next = { ...prev, [id]: !prev[id] };
      localStorage.setItem("voyage_likes", JSON.stringify(next));
      return next;
    });
  };

  const filtered = useMemo(() => {
    let r = allWorks;
    if (round !== "all") r = r.filter((w) => w.round === Number(round));
    if (sort === "hot") {
      r = [...r].sort((a, b) => (b.likes + (likedIds[b.id] ? 1 : 0)) - (a.likes + (likedIds[a.id] ? 1 : 0)));
    } else {
      r = [...r].sort((a, b) => b.createdAt - a.createdAt);
    }
    return r;
  }, [allWorks, round, sort, likedIds]);

  const roundCounts = useMemo(() => {
    const c = { all: allWorks.length };
    for (let i = 1; i <= 5; i++) c[i] = allWorks.filter((w) => w.round === i).length;
    return c;
  }, [allWorks]);

  return (
    <div className="min-h-screen">
      <Navbar />
      <div className="max-w-[1280px] mx-auto px-8 pt-22 pb-16">
        <div className="mb-8 pt-4">
          <h1 className="font-cn-heavy text-[32px] text-[#0A1F3D]">作业墙</h1>
          <p className="mt-1.5 text-[14px] text-[#5A7088]">{loading ? "加载中..." : `每一个作品都是一次真实的实战，共 ${allWorks.length} 件作品`}</p>
        </div>

        <div className="flex flex-wrap items-center gap-3 mb-8">
          <div className="flex items-center gap-1 p-1 bg-white rounded-full border border-[#E7EDF3]">
            {[{ v: "all", l: "全部" }, { v: "1", l: "作业 1" }, { v: "2", l: "作业 2" }, { v: "3", l: "作业 3" }, { v: "4", l: "作业 4" }, { v: "5", l: "作业 5" }].map((r) => (
              <button key={r.v} onClick={() => setRound(r.v)}
                className={`px-3.5 h-8 rounded-full text-[12px] transition ${round === r.v ? "bg-[#0A1F3D] text-white" : "text-[#5A7088] hover:text-[#0A1F3D]"}`}>
                {r.l} <span className={`ml-1 text-[10px] ${round === r.v ? "text-white/60" : "text-[#B8C9D9]"}`}>{roundCounts[r.v === "all" ? "all" : Number(r.v)]}</span>
              </button>
            ))}
          </div>
          <div className="flex-1" />
          <div className="flex items-center gap-1 p-1 bg-white rounded-full border border-[#E7EDF3]">
            {[{ v: "new", l: "最新提交", i: "Clock" }, { v: "hot", l: "最多点赞", i: "Flame" }].map((s) => (
              <button key={s.v} onClick={() => setSort(s.v)}
                className={`px-3.5 h-8 rounded-full text-[12px] transition inline-flex items-center gap-1.5 ${sort === s.v ? "bg-[#0A1F3D] text-white" : "text-[#5A7088] hover:text-[#0A1F3D]"}`}>
                <Icon name={s.i} size={12} /> {s.l}
              </button>
            ))}
          </div>
        </div>

        <div className="grid grid-cols-4 gap-5">
          {filtered.map((w) => (
            <WorkCard key={w.id} work={w} liked={!!likedIds[w.id]} onClick={() => setViewWork(w)} onLike={toggleLike} />
          ))}
        </div>

        {filtered.length === 0 && (
          <div className="rounded-2xl border border-dashed border-[#DCE9F2] py-20 text-center text-[14px] text-[#8FA3B8]">这一站还没有作品，敬请期待</div>
        )}
      </div>

      <WorkDetailModal work={viewWork} onClose={() => setViewWork(null)} onLike={toggleLike} liked={viewWork ? !!likedIds[viewWork.id] : false} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
